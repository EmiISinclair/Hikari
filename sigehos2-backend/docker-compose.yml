version: '3.8'
services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: sigehos_user
      POSTGRES_PASSWORD: sigehos_pass
      POSTGRES_DB: sigehos_db
    ports:
      - "5432:5432"
    volumes:
      - sigehos_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: sigehos_user
      DATABASE_PASSWORD: sigehos_pass
      DATABASE_NAME: sigehos_db

volumes:
  sigehos_data:
